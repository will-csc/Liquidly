spring.application.name=backend-api
server.port=${PORT:8080}

# --- ERROR HANDLING ---
server.error.include-message=always
server.error.include-binding-errors=always

# --- DATABASE CONFIGURATION ---
# The application will try to connect in this order:
# 1. Primary (Supabase)
# 2. Backup (Local PostgreSQL)
# 3. Fallback (In-Memory H2)

# 1. PRIMARY: Supabase (Not configured yet - placeholder)
# app.datasource.primary.url=jdbc:postgresql://<SUPABASE_HOST>:5432/postgres
# app.datasource.primary.username=postgres
# app.datasource.primary.password=<PASSWORD>

# 2. BACKUP: Local PostgreSQL (Active)
app.datasource.backup.url=jdbc:postgresql://localhost:5432/liquidly
app.datasource.backup.username=postgres
app.datasource.backup.password=0710

# --- JPA Configuration ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- H2 Console (Available if fallback is used) ---
spring.h2.console.enabled=true

# --- EMAIL SERVICE (Python) ---
email.service.url=${EMAIL_SERVICE_URL:http://localhost:5000}
email.service.backupUrl=${EMAIL_SERVICE_BACKUP_URL:http://localhost:5000}
email.service.apiKey=${EMAIL_SERVICE_API_KEY:}
