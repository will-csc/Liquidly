# 2. BACKUP: Local PostgreSQL (Active)
app.datasource.backup.url=jdbc:postgresql://localhost:5432/liquidly
app.datasource.backup.username=postgres
app.datasource.backup.password=Sny-301mv

# --- JPA Configuration ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- H2 Console (Available if fallback is used) ---
spring.h2.console.enabled=true
