spring.application.name=backend-api
server.port=${PORT:8080}

# --- ERROR HANDLING ---
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
logging.exception-conversion-word=%ex{1}

# --- DATABASE CONFIGURATION ---
# The application will try to connect in this order:
# 1. Primary (NEON)
# 2. Backup (Local PostgreSQL)
# 3. Fallback (In-Memory H2)

# 1. PRIMARY: NEON
app.datasource.primary.url=${APP_DATASOURCE_PRIMARY_URL:}
app.datasource.primary.username=${APP_DATASOURCE_PRIMARY_USERNAME:}
app.datasource.primary.password=${APP_DATASOURCE_PRIMARY_PASSWORD:}

# 2. BACKUP: Local PostgreSQL (Active)
app.datasource.backup.url=${APP_DATASOURCE_BACKUP_URL:jdbc:postgresql://localhost:5432/liquidly}
app.datasource.backup.username=${APP_DATASOURCE_BACKUP_USERNAME:postgres}
app.datasource.backup.password=${APP_DATASOURCE_BACKUP_PASSWORD:}

# --- JPA Configuration ---
spring.jpa.hibernate.ddl-auto=${APP_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- H2 Console (Available if fallback is used) ---
spring.h2.console.enabled=true

# --- EMAIL SERVICE (Python) ---
email.service.url=${EMAIL_SERVICE_URL:http://localhost:5000}
email.service.backupUrl=${EMAIL_SERVICE_BACKUP_URL:http://localhost:5000}
email.service.apiKey=${EMAIL_SERVICE_API_KEY:}

# --- SECURITY ---
app.environment=${APP_ENVIRONMENT:development}
app.seed.default-user.enabled=${APP_SEED_DEFAULT_USER_ENABLED:false}
app.security.face-login.enabled=${APP_SECURITY_FACE_LOGIN_ENABLED:false}
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:}
app.security.jwt.expiration-ms=${APP_SECURITY_JWT_EXPIRATION_MS:3600000}
app.security.jwt.issuer=${APP_SECURITY_JWT_ISSUER:liquidly-backend}
app.security.cors.allowed-origin-patterns=${APP_SECURITY_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://localhost:8081,http://localhost:19006,http://localhost:19000,http://localhost:19001}
